<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FillerSkip – Guide des fillers anime</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #09090f; color: #e2e8f0; min-height: 100vh; }

header { border-bottom: 1px solid rgba(255,255,255,0.07); padding: 1.75rem 1rem 1.25rem; }
header .inner { max-width: 680px; margin: 0 auto; }
header h1 { font-size: clamp(1.4rem,4vw,2rem); color: #f8fafc; letter-spacing: -0.02em; display: inline; }
header .version { font-size: 0.7rem; color: #475569; font-family: monospace; margin-left: 0.5rem; }
header p { font-size: 0.85rem; color: #475569; margin-top: 0.25rem; }

.container { max-width: 680px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }

.controls { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
.controls input, .controls select {
background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
border-radius: 8px; padding: 0.55rem 0.9rem; color: #e2e8f0;
font-size: 0.88rem; outline: none; font-family: inherit;
}
.controls input { flex: 1; min-width: 160px; }
.controls select { cursor: pointer; }

.legend { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: #64748b; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.cards { display: flex; flex-direction: column; gap: 0.6rem; }

.card {
background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
border-radius: 14px; padding: 1.1rem; cursor: pointer;
transition: all 0.2s; position: relative; overflow: hidden;
}
.card:hover { background: rgba(255,255,255,0.06); }
.card-stripe { position: absolute; top: 0; left: 0; width: 3px; height: 100%; border-radius: 14px 0 0 14px; }
.card-body { display: flex; align-items: flex-start; gap: 0.75rem; }
.card-emoji { font-size: 1.6rem; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
.card-name { font-size: 0.95rem; font-weight: 600; color: #f1f5f9; }
.card-badge { font-size: 0.65rem; padding: 0.15rem 0.5rem; border-radius: 99px; font-family: monospace; flex-shrink: 0; }
.card-studio { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
.card-stats { display: flex; gap: 1rem; margin-top: 8px; flex-wrap: wrap; }
.card-stats span { font-size: 0.78rem; color: #94a3b8; }
.card-stats b { color: #f1f5f9; }
.card-stats .red { color: #ef4444; }
.card-stats .green { color: #10b981; }

.filler-bar-wrap { margin-top: 8px; }
.filler-bar-info { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.7rem; color: #94a3b8; font-family: monospace; }
.filler-bar-track { height: 4px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
.filler-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }

.footer-note { text-align: center; font-size: 0.72rem; color: #334155; margin-top: 2rem; }

/* Detail view */
.detail { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; display: none; }
.back-btn {
background: none; border: 1px solid rgba(255,255,255,0.12); color: #94a3b8;
border-radius: 8px; padding: 0.4rem 0.9rem; cursor: pointer; font-size: 0.85rem;
margin-bottom: 1.25rem; font-family: inherit; display: flex; align-items: center; gap: 6px;
}
.detail-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
.detail-emoji { font-size: 2.5rem; }
.detail-title { font-size: 1.4rem; color: #f1f5f9; }
.detail-sub { font-size: 0.78rem; color: #64748b; }
.detail-desc { color: #94a3b8; font-size: 0.88rem; line-height: 1.6; margin-bottom: 1.25rem; }

.stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.65rem; margin-bottom: 1.25rem; }
.stat-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 0.75rem; text-align: center; }
.stat-num { font-size: 1.5rem; font-weight: bold; }
.stat-label { font-size: 0.68rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; }

.percent-bar { margin-bottom: 1.5rem; }
.percent-bar-info { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.78rem; color: #94a3b8; }
.percent-bar-track { height: 6px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
.percent-bar-fill { height: 100%; border-radius: 99px; }

.section-title { font-size: 0.82rem; color: #f1f5f9; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.75rem; }

.filler-arc {
border: 1px solid rgba(239,68,68,0.2); border-radius: 10px;
overflow: hidden; background: rgba(239,68,68,0.05); margin-bottom: 0.45rem;
}
.filler-arc-header {
display: flex; align-items: center; gap: 0.75rem;
padding: 0.65rem 0.9rem; cursor: pointer;
}
.filler-arc-range { font-family: monospace; font-size: 0.8rem; color: #f87171; min-width: 90px; flex-shrink: 0; }
.filler-arc-desc { flex: 1; font-size: 0.82rem; color: #cbd5e1; }
.filler-arc-count { font-size: 0.7rem; color: #475569; flex-shrink: 0; }
.filler-arc-arrow { font-size: 0.75rem; color: #475569; flex-shrink: 0; transition: transform 0.2s; }
.filler-arc-arrow.open { transform: rotate(90deg); }

.filler-arc-body { padding: 0 0.9rem 0.75rem; border-top: 1px solid rgba(239,68,68,0.15); display: none; }
.filler-arc-body.open { display: block; }
.pills { padding-top: 0.6rem; display: flex; flex-wrap: wrap; gap: 0.35rem; }
.pill {
font-family: monospace; font-size: 0.75rem; padding: 0.2rem 0.55rem;
border-radius: 6px; background: rgba(239,68,68,0.15);
border: 1px solid rgba(239,68,68,0.3); color: #f87171;
}
.filler-tip { margin: 0.6rem 0 0; font-size: 0.75rem; color: #64748b; font-style: italic; }

.must-watch {
background: rgba(16,185,129,0.07); border: 1px solid rgba(16,185,129,0.2);
border-radius: 10px; padding: 1rem;
}
.must-watch h3 { font-size: 0.82rem; color: #34d399; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
.must-watch p { font-size: 0.82rem; color: #94a3b8; line-height: 1.8; font-family: monospace; }
</style>

</head>

<header>
  <div class="inner">
    <h1>FillerSkip</h1><span class="version">v1.1</span>
    <p>Guide des fillers pour les 10 animes les plus populaires</p>

<!-- LIST VIEW -->

    <select id="sortSelect" onchange="renderCards()">

</div>

<!-- DETAIL VIEW -->

<div class="detail" id="detailView">

function range(a, b) {
  const arr = [];
  for (let i = a; i <= b; i++) arr.push(i);
  return arr;
}

function barColor(pct) {
  return pct < 20 ? "#10b981" : pct < 40 ? "#f59e0b" : "#ef4444";
}

function badgeStyle(status) {
  if (status === "En cours") return "background:rgba(16,185,129,0.15);color:#34d399;border:1px solid rgba(16,185,129,0.3)";
  if (status === "En pause") return "background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3)";
  return "background:rgba(100,116,139,0.2);color:#94a3b8;border:1px solid rgba(100,116,139,0.3)";
}

function renderCards() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const sort = document.getElementById("sortSelect").value;
  let list = animes.filter(a => a.name.toLowerCase().includes(q));
  if (sort === "fillers") list.sort((a,b) => (b.fillers/b.total) - (a.fillers/a.total));
  else if (sort === "episodes") list.sort((a,b) => b.total - a.total);
  else list.sort((a,b) => a.name.localeCompare(b.name));

  const container = document.getElementById("cardsContainer");
  container.innerHTML = list.map(a => {
    const pct = Math.round(a.fillers/a.total*100);
    const bc = barColor(pct);
    return `
      <div class="card" onclick="showDetail(${a.id})" onmouseenter="this.style.borderColor='${a.color}55'" onmouseleave="this.style.borderColor='rgba(255,255,255,0.08)'">
        <div class="card-stripe" style="background:${a.color}"></div>
        <div class="card-body">
          <div class="card-emoji">${a.emoji}</div>
          <div class="card-info">
            <div class="card-top">
              <span class="card-name">${a.name}</span>
              <span class="card-badge" style="${badgeStyle(a.status)}">${a.status}</span>
            </div>
            <div class="card-studio">${a.studio} · ${a.genre}</div>
            <div class="card-stats">
              <span><b>${a.total}</b> éps total</span>
              <span><b class="red">${a.fillers}</b> fillers</span>
              <span><b class="green">${a.total - a.fillers}</b> canon</span>
            </div>
            <div class="filler-bar-wrap">
              <div class="filler-bar-info"><span>Fillers</span><span style="color:${bc};font-weight:bold">${pct}%</span></div>
              <div class="filler-bar-track"><div class="filler-bar-fill" style="width:${pct}%;background:${bc}"></div></div>
            </div>
          </div>
        </div>
      </div>`;
  }).join("");

  document.getElementById("footerNote").textContent = `${list.length} anime${list.length > 1 ? 's' : ''} · Clique sur une carte pour le guide détaillé`;
}

function showDetail(id) {
  const a = animes.find(x => x.id === id);
  const pct = Math.round(a.fillers/a.total*100);
  const bc = barColor(pct);

  const fillersHTML = a.fillerList.map((f, i) => `
    <div class="filler-arc">
      <div class="filler-arc-header" onclick="toggleArc(this)">
        <span class="filler-arc-range">Ép. ${f.range}</span>
        <span class="filler-arc-desc">${f.desc}</span>
        <span class="filler-arc-count">${f.eps.length} éps</span>
        <span class="filler-arc-arrow">▶</span>
      </div>
      <div class="filler-arc-body">
        <div class="pills">${f.eps.map(e => `<span class="pill">#${e}</span>`).join("")}</div>
        <p class="filler-tip">💡 ${f.desc}</p>
      </div>
    </div>`).join("");

  document.getElementById("detailContent").innerHTML = `
    <div class="detail-header">
      <div class="detail-emoji">${a.emoji}</div>
      <div>
        <div class="detail-title">${a.name}</div>
        <div class="detail-sub">${a.studio} · ${a.genre} · ${a.status}</div>
      </div>
    </div>
    <p class="detail-desc">${a.desc}</p>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num" style="color:#f1f5f9">${a.total}</div><div class="stat-label">Total</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#10b981">${a.total - a.fillers}</div><div class="stat-label">Canon</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#ef4444">${a.fillers}</div><div class="stat-label">Fillers</div></div>
    </div>
    <div class="percent-bar">
      <div class="percent-bar-info"><span>Taux de fillers</span><span style="color:${bc};font-weight:bold">${pct}%</span></div>
      <div class="percent-bar-track"><div class="percent-bar-fill" style="width:${pct}%;background:${bc}"></div></div>
    </div>
    <div class="section-title">❌ Épisodes à sauter — ${a.fillers} éps</div>
    ${fillersHTML}
    <div class="must-watch" style="margin-top:1.5rem">
      <h3>✅ Épisodes canon à regarder</h3>
      <p>${a.mustWatch}</p>
    </div>`;

  document.getElementById("listView").style.display = "none";
  document.getElementById("detailView").style.display = "block";
  window.scrollTo(0, 0);
}

function showList() {
  document.getElementById("listView").style.display = "block";
  document.getElementById("detailView").style.display = "none";
}

function toggleArc(header) {
  const arrow = header.querySelector(".filler-arc-arrow");
  const body = header.nextElementSibling;
  arrow.classList.toggle("open");
  body.classList.toggle("open");
}

renderCards();
</script>

</body>
</html>
